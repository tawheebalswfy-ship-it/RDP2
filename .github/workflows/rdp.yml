name: RDP + MT5 Only (Safe Multi-Release)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: 1. Setup RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Restart-Service -Name TermService -Force

      - name: 2. Create RDP User
        shell: pwsh
        run: |
          $password = "Admin@MT5#2026"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          $user = "RDP"

          try {
            New-LocalUser -Name $user -Password $securePass -AccountNeverExpires -ErrorAction Stop
          } catch {
            Write-Host "User may already exist, continuing..."
          }

          try { Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction Stop } catch {}
          try { Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user -ErrorAction Stop } catch {}

          "RDP_USER=$user" >> $env:GITHUB_ENV
          "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: 3. Download and Extract MT5 to Desktop
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent"  = "gh-actions"
            Accept        = "application/vnd.github+json"
          }

          $repo = "${{ github.repository }}"
          $desktop = [System.Environment]::GetFolderPath("Desktop")

          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" -Headers $headers

          $assetMT5 = $null
          $assetMT5Release = $null

          foreach ($release in $releases) {
            if (-not $release.assets) { continue }

            if (-not $assetMT5) {
              $candidateMT5 = $release.assets | Where-Object {
                $_.name -like "*MetaTrader.5.zip*" -or $_.name -like "*MT5.zip*"
              } | Select-Object -First 1

              if ($candidateMT5) {
                $assetMT5 = $candidateMT5
                $assetMT5Release = $release.tag_name
              }
            }

            if ($assetMT5) { break }
          }

          if (-not $assetMT5) {
            Write-Host "MT5 asset not found in any release" -ForegroundColor Red
            exit 1
          }

          Write-Host "Downloading MT5: $($assetMT5.name)"
          Write-Host "Found in release: $assetMT5Release"
          Invoke-WebRequest -Uri $assetMT5.browser_download_url -OutFile "$env:TEMP\MT5.zip" -Headers $headers
          Expand-Archive -Path "$env:TEMP\MT5.zip" -DestinationPath "$desktop\MT5_Platform" -Force

      - name: 4. Detect MT5 Executable and Create Login Config
        shell: pwsh
        run: |
          $desktop = [System.Environment]::GetFolderPath("Desktop")

          $mt5Candidates = Get-ChildItem -Path "$desktop\MT5_Platform" -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -in @("terminal64.exe", "terminal.exe", "launcher.exe") }

          $mt5Exe = $mt5Candidates |
            Sort-Object @{ Expression = {
              switch ($_.Name) {
                "terminal64.exe" { 0 }
                "terminal.exe"   { 1 }
                "launcher.exe"   { 2 }
                default          { 9 }
              }
            }} |
            Select-Object -First 1

          if (-not $mt5Exe) {
            Write-Host "MT5 executable not found" -ForegroundColor Red
            exit 1
          }

          $mt5Dir = $mt5Exe.DirectoryName
          $vmIniPath = Join-Path $mt5Dir "vm.ini"

          $vmContent = @(
            "[Common]"
            "Login=52814428"
            "Password=XWkO&5Z00tXPr8"
            "Server=ICMarketsSC-Demo"
            "KeepPrivate=1"
            "NewsEnable=0"
          ) -join "`r`n"

          $vmContent | Out-File -FilePath $vmIniPath -Encoding Unicode -Force

          "MT5_EXE=$($mt5Exe.FullName)" >> $env:GITHUB_ENV
          "MT5_INI=$vmIniPath" >> $env:GITHUB_ENV

          Write-Host "MT5 EXE: $($mt5Exe.FullName)"
          Write-Host "MT5 INI: $vmIniPath"

      - name: 5. Connect Tailscale
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "$env:TEMP\ts.msi", "/quiet", "/norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TS_KEY --hostname=Trader-VM
          $tsIP = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4 | Select-Object -First 1).Trim()
          "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 6. Launch MT5 Platform
        shell: pwsh
        run: |
          Get-Process -Name "terminal", "terminal64", "launcher", "metatrader" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 3

          if ($env:MT5_EXE -and (Test-Path $env:MT5_EXE) -and $env:MT5_INI -and (Test-Path $env:MT5_INI)) {
            Write-Host "Launching MT5..."
            Write-Host "MT5 EXE: $env:MT5_EXE"
            Write-Host "MT5 INI: $env:MT5_INI"

            Start-Process `
              -FilePath $env:MT5_EXE `
              -ArgumentList "/portable", "/config:$env:MT5_INI" `
              -WorkingDirectory (Split-Path $env:MT5_EXE -Parent)
          } else {
            Write-Host "MT5 exe or ini missing" -ForegroundColor Red
            exit 1
          }

      - name: 7. Keep Alive
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY - MT5 ONLY"
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "User    : $env:RDP_USER"
          Write-Host "Pass    : $env:RDP_PASS"
          Write-Host "MT5 EXE : $env:MT5_EXE"
          Write-Host "MT5 INI : $env:MT5_INI"
          Write-Host "=============================="

          $end = (Get-Date).AddMinutes(345)
          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 60
          }
