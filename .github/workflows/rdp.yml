name: RDP + MT5 Only (Safe Multi-Release)
hh
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: mt5-rdp-session
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: 1. Setup RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Restart-Service -Name TermService -Force

      - name: 2 Setup runneradmin RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          if (-not $env:RDP_PASSWORD) {
            Write-Host "RDP_PASSWORD secret is missing" -ForegroundColor Red
            exit 1
          }

          $password = $env:RDP_PASSWORD
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          $user = "runneradmin"

          Write-Host "Setting RDP password for runneradmin..."

          try {
            Set-LocalUser -Name $user -Password $securePass -ErrorAction Stop
          } catch {
            Write-Host "Failed to set password for runneradmin" -ForegroundColor Red
            Write-Host $_.Exception.Message
            exit 1
          }

          try { Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction Stop } catch {}
          try { Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user -ErrorAction Stop } catch {}

          "RDP_USER=$user" >> $env:GITHUB_ENV
          "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: 3 Restore MT5 Cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\Desktop\MT5_Platform
          key: mt5-session-${{ github.run_id }}
          restore-keys: |
            mt5-session-

      - name: 4. Download and Extract All Release ZIP Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent"  = "gh-actions"
            Accept        = "application/vnd.github+json"
          }

          $repo = "${{ github.repository }}"
          $desktop = [System.Environment]::GetFolderPath("Desktop")
          $mt5Path = "$desktop\MT5_Platform"

          $existingMt5 = Get-ChildItem -Path $mt5Path -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -in @("terminal64.exe", "terminal.exe", "launcher.exe") } |
            Select-Object -First 1

          if ($existingMt5) {
            Write-Host "Previous MT5 data restored successfully."
            Write-Host "Skipping fresh release download."
            exit 0
          }

          if (Test-Path $mt5Path) {
            Remove-Item $mt5Path -Recurse -Force -ErrorAction SilentlyContinue
          }

          New-Item -ItemType Directory -Path $mt5Path -Force | Out-Null

          Write-Host "Getting all release assets..."

          $allReleases = @()
          $page = 1

          do {
            $pageReleases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=100&page=$page" -Headers $headers
            if (-not $pageReleases -or $pageReleases.Count -eq 0) { break }
            $allReleases += $pageReleases
            $page++
          } while ($true)

          if (-not $allReleases -or $allReleases.Count -eq 0) {
            Write-Host "No releases found for repository $repo" -ForegroundColor Red
            exit 1
          }

          $allZipAssets = @()
          foreach ($release in $allReleases) {
            $releaseTag = if ($release.tag_name) { $release.tag_name } else { "untagged-release-$($release.id)" }
            $zipAssets = $release.assets | Where-Object { $_.name -like "*.zip" }
            foreach ($asset in $zipAssets) {
              $allZipAssets += [PSCustomObject]@{
                ReleaseTag = $releaseTag
                Asset      = $asset
              }
            }
          }

          if (-not $allZipAssets -or $allZipAssets.Count -eq 0) {
            Write-Host "No ZIP assets found in any release" -ForegroundColor Red
            exit 1
          }

          foreach ($entry in $allZipAssets) {
            $asset = $entry.Asset
            $releaseTag = $entry.ReleaseTag

            Write-Host "Downloading $($asset.name) from release $releaseTag"

            $safeName = $asset.name -replace '[\\/:*?"<>|]', '_'
            $safeRelease = $releaseTag -replace '[\\/:*?"<>|]', '_'
            $zipFile = Join-Path $env:TEMP "$safeRelease-$safeName"
            $extractDir = Join-Path $mt5Path "$safeRelease-$([System.IO.Path]::GetFileNameWithoutExtension($safeName))"

            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipFile -Headers $headers

            New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

            Write-Host "Extracting to: $extractDir"
            Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force
          }

          Write-Host "All release ZIP assets downloaded and extracted."

      - name: 5. Detect MT5 Executable and Create Login Config
        shell: pwsh
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          $desktop = [System.Environment]::GetFolderPath("Desktop")
          $mt5Path = "$desktop\MT5_Platform"
          $launcherPath = Join-Path $mt5Path "MT5\launcher.exe"

          if (Test-Path $launcherPath) {
            Write-Host "Found launcher.exe at expected path: $launcherPath"
            $mt5Exe = Get-Item $launcherPath
          } else {
            $mt5Candidates = Get-ChildItem -Path $mt5Path -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("launcher.exe", "terminal64.exe", "terminal.exe") }

            $mt5Exe = $mt5Candidates |
              Sort-Object @{ Expression = {
                switch ($_.Name) {
                  "launcher.exe"   { 0 }
                  "terminal64.exe" { 1 }
                  "terminal.exe"   { 2 }
                  default          { 9 }
                }
              }} |
              Select-Object -First 1
          }

          if (-not $mt5Exe) {
            Write-Host "MT5 executable not found" -ForegroundColor Red
            exit 1
          }

          $mt5Dir = $mt5Exe.DirectoryName
          $vmIniPath = Join-Path $mt5Dir "vm.ini"

          $mt5Login = if ($env:MT5_LOGIN) { $env:MT5_LOGIN } else { "52814428" }
          $mt5Password = if ($env:MT5_PASSWORD) { $env:MT5_PASSWORD } else { "XWkO&5Z00tXPr8" }
          $mt5Server = if ($env:MT5_SERVER) { $env:MT5_SERVER } else { "ICMarketsSC-Demo" }

          $vmContent = @(
            "[Common]"
            "Login=$mt5Login"
            "Password=$mt5Password"
            "Server=$mt5Server"
            "KeepPrivate=1"
            "AutoLogin=1"
            "NewsEnable=0"
          ) -join "`r`n"

          $vmContent | Out-File -FilePath $vmIniPath -Encoding Unicode -Force

          "MT5_EXE=$($mt5Exe.FullName)" >> $env:GITHUB_ENV
          "MT5_INI=$vmIniPath" >> $env:GITHUB_ENV

          Write-Host "MT5 EXE: $($mt5Exe.FullName)"
          Write-Host "MT5 INI: $vmIniPath"

      - name: 6. Connect Tailscale
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if (-not $env:TS_KEY) {
            Write-Host "TAILSCALE_AUTH_KEY secret is missing" -ForegroundColor Red
            exit 1
          }

          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "$env:TEMP\ts.msi", "/quiet", "/norestart" -Wait

          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TS_KEY --hostname=Trader-VM

          $tsIP = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4 | Select-Object -First 1).Trim()

          if (-not $tsIP) {
            Write-Host "Failed to get Tailscale IP" -ForegroundColor Red
            exit 1
          }

          "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 7. Launch MT5 Platform
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          Get-Process -Name "terminal", "terminal64", "launcher", "metatrader" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 3

          if (-not ($env:MT5_EXE -and (Test-Path $env:MT5_EXE))) {
            Write-Host "MT5 exe missing" -ForegroundColor Red
            exit 1
          }

          if (-not ($env:MT5_INI -and (Test-Path $env:MT5_INI))) {
            Write-Host "MT5 ini missing" -ForegroundColor Red
            exit 1
          }

          Write-Host "Preparing MT5 auto launch for RDP user..."
          Write-Host "MT5 EXE: $env:MT5_EXE"
          Write-Host "MT5 INI: $env:MT5_INI"

          $rdpUser = "runneradmin"
          $mt5Dir = Split-Path $env:MT5_EXE -Parent

          $startupDir = "C:\Users\$rdpUser\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup"
          New-Item -ItemType Directory -Path $startupDir -Force | Out-Null

          $batPath = Join-Path $startupDir "Start-MT5.bat"

          $batContent = @"
          @echo off
          timeout /t 5 /nobreak >nul
          cd /d "$mt5Dir"
          start "" "$env:MT5_EXE" /portable /config:"$env:MT5_INI"
          "@

          $batContent | Out-File -FilePath $batPath -Encoding ASCII -Force

          Write-Host "Startup file created:"
          Write-Host $batPath

          $taskName = "Launch-MT5-On-RDP-Login"
          $taskAction = "`"$env:MT5_EXE`" /portable /config:`"$env:MT5_INI`""

          Write-Host "Creating scheduled task for RDP login..."
          Start-Process -FilePath schtasks.exe -ArgumentList "/Create", "/TN", $taskName, "/TR", $taskAction, "/SC", "ONLOGON", "/RU", $rdpUser, "/RP", $env:RDP_PASSWORD, "/RL", "HIGHEST", "/F", "/IT" -Wait

          Write-Host "Scheduled task created: $taskName"
          Write-Host "Attempting to run it now as runneradmin..."
          Start-Process -FilePath schtasks.exe -ArgumentList "/Run", "/TN", $taskName -Wait

          Write-Host "If MT5 is not visible yet, log out/in as runneradmin or reconnect. It will auto start on next login."

      - name: 8. Keep Alive
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY - MT5 ONLY"
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "User    : $env:RDP_USER"
          Write-Host "Pass    : $env:RDP_PASS"
          Write-Host "MT5 EXE : $env:MT5_EXE"
          Write-Host "MT5 INI : $env:MT5_INI"
          Write-Host "=============================="

          # Ends before timeout so the next step can upload MT5 data.
          $end = (Get-Date).AddMinutes(340)

          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 60
          }

          Write-Host "Session finished safely. Saving MT5 data next..."

      - name: 9 Save MT5 Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\Users\runneradmin\Desktop\MT5_Platform
          key: mt5-session-${{ github.run_id }}

