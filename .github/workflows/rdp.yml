name: RDP + MT5 Only Safe Multi Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: mt5-rdp-session
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: 1 Setup RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Restart-Service -Name TermService -Force

      - name: 2 Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          if (-not $env:RDP_PASSWORD) {
            Write-Host "RDP_PASSWORD secret is missing" -ForegroundColor Red
            exit 1
          }

          $password = $env:RDP_PASSWORD
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          $user = "RDP"

          try {
            New-LocalUser -Name $user -Password $securePass -AccountNeverExpires -ErrorAction Stop
          } catch {
            Write-Host "User may already exist, continuing..."
          }

          try {
            Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction Stop
          } catch {}

          try {
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user -ErrorAction Stop
          } catch {}

          "RDP_USER=$user" >> $env:GITHUB_ENV
          "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: 3 Restore MT5 Cache
        uses: actions/cache/restore@v4
        with:
          path: C:\MT5_Platform
          key: mt5-session-${{ github.run_id }}
          restore-keys: |
            mt5-session-

      - name: 4 Download and Extract MT5
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $mt5Path = "C:\MT5_Platform"

          $existingMt5 = Get-ChildItem -Path $mt5Path -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -in @("launcher.exe", "terminal64.exe", "terminal.exe") } |
            Select-Object -First 1

          if ($existingMt5) {
            Write-Host "Previous MT5 data restored successfully."
            Write-Host "Skipping fresh MT5 download."
            exit 0
          }

          Write-Host "No previous MT5 data found. Searching releases..."

          $apiHeaders = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent" = "gh-actions"
            Accept = "application/vnd.github+json"
          }

          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" -Headers $apiHeaders -ErrorAction Stop

          $assetMT5 = $null
          $assetMT5Release = $null

          foreach ($release in $releases) {
            if (-not $release.assets) {
              continue
            }

            $candidateMT5 = $release.assets | Where-Object {
              $_.name -like "*MetaTrader.5.zip*" -or $_.name -like "*MT5.zip*"
            } | Select-Object -First 1

            if ($candidateMT5) {
              $assetMT5 = $candidateMT5
              $assetMT5Release = $release.tag_name
              break
            }
          }

          if (-not $assetMT5) {
            Write-Host "MT5 asset not found in any release" -ForegroundColor Red
            exit 1
          }

          Write-Host "Found MT5 asset: $($assetMT5.name)"
          Write-Host "Found in release: $assetMT5Release"
          Write-Host "Asset size from GitHub: $($assetMT5.size) bytes"

          $downloadPath = "$env:TEMP\MT5.zip"

          if (Test-Path $downloadPath) {
            Remove-Item $downloadPath -Force -ErrorAction SilentlyContinue
          }

          Write-Host "Downloading MT5 using GitHub asset API..."

          curl.exe -L --fail `
            -H "Authorization: Bearer $env:GH_TOKEN" `
            -H "User-Agent: gh-actions" `
            -H "Accept: application/octet-stream" `
            -o "$downloadPath" `
            "$($assetMT5.url)"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "curl download failed with exit code $LASTEXITCODE" -ForegroundColor Red
            exit 1
          }

          if (-not (Test-Path $downloadPath)) {
            Write-Host "MT5.zip was not downloaded" -ForegroundColor Red
            exit 1
          }

          $zipSize = (Get-Item $downloadPath).Length
          Write-Host "Downloaded MT5.zip size: $zipSize bytes"

          if ($zipSize -lt 1000000) {
            Write-Host "Downloaded file is too small. Possible download failure." -ForegroundColor Red
            exit 1
          }

          if (Test-Path $mt5Path) {
            Remove-Item $mt5Path -Recurse -Force -ErrorAction SilentlyContinue
          }

          New-Item -ItemType Directory -Path $mt5Path -Force | Out-Null

          Write-Host "Extracting MT5.zip..."
          Expand-Archive -Path $downloadPath -DestinationPath $mt5Path -Force

          Write-Host "MT5 extracted successfully to $mt5Path"

      - name: 5 Detect MT5 Executable and Create Login Config
        shell: pwsh
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          if (-not $env:MT5_LOGIN) {
            Write-Host "MT5_LOGIN secret is missing" -ForegroundColor Red
            exit 1
          }

          if (-not $env:MT5_PASSWORD) {
            Write-Host "MT5_PASSWORD secret is missing" -ForegroundColor Red
            exit 1
          }

          if (-not $env:MT5_SERVER) {
            Write-Host "MT5_SERVER secret is missing" -ForegroundColor Red
            exit 1
          }

          $mt5Path = "C:\MT5_Platform"

          $mt5Candidates = Get-ChildItem -Path $mt5Path -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -in @("launcher.exe", "terminal64.exe", "terminal.exe") }

          $mt5Exe = $mt5Candidates |
            Sort-Object @{ Expression = {
              switch ($_.Name) {
                "launcher.exe"   { 0 }
                "terminal64.exe" { 1 }
                "terminal.exe"   { 2 }
                default          { 9 }
              }
            }} |
            Select-Object -First 1

          if (-not $mt5Exe) {
            Write-Host "MT5 executable not found" -ForegroundColor Red
            exit 1
          }

          $mt5Dir = $mt5Exe.DirectoryName
          $vmIniPath = Join-Path $mt5Dir "vm.ini"

          $vmContent = @(
            "[Common]"
            "Login=$env:MT5_LOGIN"
            "Password=$env:MT5_PASSWORD"
            "Server=$env:MT5_SERVER"
            "KeepPrivate=1"
            "NewsEnable=0"
          ) -join "`r`n"

          $vmContent | Out-File -FilePath $vmIniPath -Encoding Unicode -Force

          "MT5_EXE=$($mt5Exe.FullName)" >> $env:GITHUB_ENV
          "MT5_INI=$vmIniPath" >> $env:GITHUB_ENV

          Write-Host "MT5 EXE: $($mt5Exe.FullName)"
          Write-Host "MT5 INI: $vmIniPath"

      - name: 6 Connect Tailscale
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if (-not $env:TS_KEY) {
            Write-Host "TAILSCALE_AUTH_KEY secret is missing" -ForegroundColor Red
            exit 1
          }

          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "$env:TEMP\ts.msi", "/quiet", "/norestart" -Wait

          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TS_KEY --hostname=Trader-VM

          $tsIP = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4 | Select-Object -First 1).Trim()

          if (-not $tsIP) {
            Write-Host "Failed to get Tailscale IP" -ForegroundColor Red
            exit 1
          }

          "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 7 Prepare MT5 Auto Launch
        shell: pwsh
        run: |
          Get-Process -Name "terminal", "terminal64", "launcher", "metatrader" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue

          Start-Sleep -Seconds 3

          if (-not ($env:MT5_EXE -and (Test-Path $env:MT5_EXE))) {
            Write-Host "MT5 exe missing" -ForegroundColor Red
            exit 1
          }

          if (-not ($env:MT5_INI -and (Test-Path $env:MT5_INI))) {
            Write-Host "MT5 ini missing" -ForegroundColor Red
            exit 1
          }

          $mt5Dir = Split-Path $env:MT5_EXE -Parent

          Write-Host "Preparing MT5 auto launch..."
          Write-Host "MT5 EXE: $env:MT5_EXE"
          Write-Host "MT5 INI: $env:MT5_INI"

          $commonStartupDir = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          New-Item -ItemType Directory -Path $commonStartupDir -Force | Out-Null

          $batPath = Join-Path $commonStartupDir "Start-MT5.bat"

          $batLines = @(
            "@echo off",
            "timeout /t 5 /nobreak >nul",
            "cd /d `"$mt5Dir`"",
            "start `"`" `"$env:MT5_EXE`" /portable /config:`"$env:MT5_INI`""
          )

          $batLines | Out-File -FilePath $batPath -Encoding ASCII -Force

          Write-Host "Common startup file created:"
          Write-Host $batPath

          $publicDesktop = "C:\Users\Public\Desktop"
          New-Item -ItemType Directory -Path $publicDesktop -Force | Out-Null

          $shortcutPath = Join-Path $publicDesktop "MT5 Platform.lnk"
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($shortcutPath)
          $shortcut.TargetPath = $env:MT5_EXE
          $shortcut.Arguments = "/portable /config:`"$env:MT5_INI`""
          $shortcut.WorkingDirectory = $mt5Dir
          $shortcut.Save()

          Write-Host "Public desktop shortcut created:"
          Write-Host $shortcutPath

          Write-Host "Trying to launch MT5 now from workflow session..."
          Start-Process -FilePath $env:MT5_EXE -ArgumentList "/portable", "/config:$env:MT5_INI" -WorkingDirectory $mt5Dir

          Write-Host "If MT5 is not visible, reconnect RDP. It will auto start after login."

      - name: 8 Keep Alive
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP READY - MT5 ONLY"
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "User    : $env:RDP_USER"
          Write-Host "Pass    : $env:RDP_PASS"
          Write-Host "MT5 EXE : $env:MT5_EXE"
          Write-Host "MT5 INI : $env:MT5_INI"
          Write-Host "=============================="

          $end = (Get-Date).AddMinutes(340)

          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 60
          }

          Write-Host "Session finished safely. Saving MT5 cache next..."

      - name: 9 Save MT5 Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\MT5_Platform
          key: mt5-session-${{ github.run_id }}
